<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 320px;
  font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
  font-size: 11px;
  --bg:        #0d0e10;
  --bg-2:      #14161a;
  --bg-3:      #1a1d22;
  --border:    #2a2f37;
  --fg:        #d6dae0;
  --fg-2:      #9aa1ab;
  --fg-3:      #6a7180;
  --fg-mute:   #4a505c;
  --accent:    #6ab0ff;
  --accent-bg: rgba(106,176,255,0.14);
  --s-ok:      #4ec9b0;
  --s-err:     #ff5a6e;
  background: var(--bg);
  color: var(--fg);
}
body[data-theme="light"] {
  --bg:        #fbfaf7;
  --bg-2:      #ffffff;
  --bg-3:      #f3f1ec;
  --border:    #d9d4c4;
  --fg:        #1a1c20;
  --fg-2:      #4a4f59;
  --fg-3:      #6c727c;
  --fg-mute:   #9a9fa8;
  --accent:    #2a6fdb;
  --accent-bg: rgba(42,111,219,0.12);
  --s-ok:      #1a8473;
  --s-err:     #c0273f;
}

/* ── Header ── */
.phead {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
}
.phead .mark {
  width: 22px; height: 22px;
  background: var(--accent);
  border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  color: var(--bg);
  font-weight: 700; font-size: 11px;
  flex-shrink: 0;
}
.phead .title {
  font-weight: 700; font-size: 11px;
  letter-spacing: 0.08em; text-transform: uppercase;
  flex: 1;
}
.phead .ver { font-size: 9px; color: var(--fg-mute); }

/* ── Sections ── */
.section {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}
.sec-head {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 9px; color: var(--fg-3);
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 10px;
}
.badge {
  font-size: 9px;
  padding: 1px 5px;
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--fg-2);
  letter-spacing: 0.04em;
  text-transform: none;
  white-space: nowrap;
}
.badge.on {
  color: var(--s-ok);
  border-color: var(--s-ok);
  background: rgba(78,201,176,0.08);
}
.badge.off { color: var(--fg-mute); }

/* ── Status line ── */
.status-line {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 2px;
  margin-bottom: 8px;
}
.status-line .sd {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--s-ok);
  flex-shrink: 0;
}
.status-line.off .sd { background: var(--fg-mute); }
.status-line .host {
  flex: 1; color: var(--fg);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.status-line .state {
  font-size: 9px; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--accent);
  white-space: nowrap;
}
.status-line.off .state { color: var(--fg-mute); }

/* ── Buttons ── */
.row { display: flex; gap: 6px; margin-bottom: 6px; }
.row:last-child { margin-bottom: 0; }
.btn {
  flex: 1;
  background: var(--bg-2);
  color: var(--fg-2);
  border: 1px solid var(--border);
  padding: 7px 10px;
  border-radius: 2px;
  font-family: inherit; font-size: 11px;
  text-align: center;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  cursor: pointer;
  transition: opacity 0.12s;
}
.btn.primary {
  background: var(--accent-bg);
  color: var(--accent);
  border-color: var(--accent);
}
.btn.dim { color: var(--fg-mute); }
.btn:hover { opacity: 0.8; }

/* ── Host input ── */
.input-row { display: flex; gap: 6px; margin-bottom: 8px; }
.host-input {
  flex: 1; min-width: 0;
  background: var(--bg-2);
  color: var(--fg);
  border: 1px solid var(--border);
  padding: 7px 10px;
  border-radius: 2px;
  font-family: inherit; font-size: 11px;
  outline: none;
}
.host-input::placeholder { color: var(--fg-mute); }
.host-input:focus { border-color: var(--accent); }
.add-btn {
  background: var(--accent-bg);
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 7px 12px;
  border-radius: 2px;
  font-family: inherit; font-size: 11px;
  cursor: pointer;
  flex-shrink: 0;
}

/* ── Host list ── */
.host-list { display: flex; flex-direction: column; gap: 4px; }
.host-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 2px;
  font-size: 11px;
}
.host-item.current {
  border-color: var(--accent);
  background: var(--accent-bg);
}
.host-item .host-name {
  flex: 1; color: var(--fg);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.host-item .host-meta {
  font-size: 9px; color: var(--fg-3);
  text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap;
}
.host-item .host-now {
  font-size: 9px; color: var(--accent); white-space: nowrap;
}
.host-item .host-remove {
  background: transparent; border: none;
  color: var(--fg-mute);
  font-family: inherit; font-size: 15px; line-height: 1;
  cursor: pointer; padding: 0 2px;
}
.host-item .host-remove:hover { color: var(--s-err); }
.host-empty {
  padding: 12px 10px;
  text-align: center;
  color: var(--fg-mute);
  font-size: 10px; font-style: italic;
  border: 1px dashed var(--border);
  border-radius: 2px;
}

/* ── Footer ── */
.pfooter {
  padding: 8px 14px;
  background: var(--bg-2);
  font-size: 9px; color: var(--fg-3);
  display: flex; gap: 8px; align-items: center;
  border-top: 1px solid var(--border);
}
.pfooter a {
  color: var(--fg-2);
  text-decoration: none;
  border-bottom: 1px dotted var(--fg-mute);
}
.pfooter .spacer { flex: 1; }
.pfooter .pm {
  display: inline-flex; align-items: center; gap: 4px;
  color: var(--fg-2);
}
.pfooter .pm .d {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--s-ok);
}
.pfooter .pm.idle .d { background: var(--fg-mute); }

/* ── Tooltips ── */
[data-tip] { position: relative; }
[data-tip]::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 7px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-3);
  color: var(--fg-2);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 4px 8px;
  font-size: 9px;
  line-height: 1.5;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.1s;
  z-index: 999;
}
[data-tip]::before {
  content: '';
  position: absolute;
  bottom: calc(100% + 2px);
  left: 50%;
  transform: translateX(-50%);
  border: 4px solid transparent;
  border-top-color: var(--border);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.1s;
  z-index: 999;
}
[data-tip]:hover::after { opacity: 1; transition: opacity 0.15s 0.45s; }
[data-tip]:hover::before { opacity: 1; transition: opacity 0.15s 0.45s; }
[data-tip][data-tip-pos="below"]::after { bottom: auto; top: calc(100% + 7px); }
[data-tip][data-tip-pos="below"]::before {
  bottom: auto; top: calc(100% + 2px);
  border-top-color: transparent; border-bottom-color: var(--border);
}
[data-tip][data-tip-align="right"]::after { left: auto; right: 0; transform: none; }
[data-tip][data-tip-align="right"]::before { left: auto; right: 8px; transform: none; }
.input-wrap { flex: 1; min-width: 0; position: relative; display: block; }
.input-wrap .host-input { width: 100%; }
</style>
</head>
<body>

<!-- Header -->
<div class="phead">
  <div class="mark" data-tip="API overlay monitor" data-tip-pos="below">CA</div>
  <div class="title">CalloutAPI</div>
  <div class="ver" data-tip="Extension version" data-tip-pos="below" data-tip-align="right">v1.0.1</div>
</div>

<!-- Current Site -->
<div class="section">
  <div class="sec-head">
    <span>Current site</span>
    <span class="badge off" id="status-badge" data-tip="Capture status for this site" data-tip-pos="below" data-tip-align="right">inactive</span>
  </div>
  <div class="status-line off" id="status-line">
    <span class="sd" id="status-dot"></span>
    <span class="host" id="status-host">—</span>
    <span class="state" id="status-meta">add to enable</span>
  </div>
  <!-- Shown when capturing -->
  <div id="capturing-btns" style="display:none">
    <div class="row">
      <button class="btn primary" id="btn-pause" data-tip="Pause or resume request capturing">⏸ pause</button>
      <button class="btn" id="btn-toggle" data-tip="Show or hide the overlay panel" data-tip-align="right">👁 hide panel</button>
    </div>
    <div class="row">
      <button class="btn dim" id="btn-export" data-tip="Export captured requests as HAR file">↓ export har</button>
      <button class="btn dim" id="btn-clear" data-tip="Clear all captured requests" data-tip-align="right">✕ clear</button>
    </div>
  </div>
  <!-- Shown when not capturing -->
  <div id="enable-row">
    <button class="btn primary" id="btn-enable" style="width:100%" data-tip="Add this site to the allowlist and start capturing">+ enable on this site</button>
  </div>
</div>

<!-- Allowed Sites -->
<div class="section">
  <div class="sec-head">
    <span>Allowed sites (<span id="site-count">0</span>)</span>
    <span class="badge" data-tip="Allowing example.com also covers sub.example.com" data-tip-align="right">subdomains inherit</span>
  </div>
  <div class="input-row">
    <span class="input-wrap" data-tip="Enter a hostname — subdomains inherit automatically">
      <input class="host-input" id="host-input" placeholder="hostname.com" autocomplete="off" spellcheck="false"/>
    </span>
    <button class="add-btn" id="btn-add-host" data-tip="Add to allowlist" data-tip-align="right">add</button>
  </div>
  <div class="host-list" id="host-list"></div>
</div>

<!-- Appearance -->
<div class="section">
  <div class="sec-head"><span>Appearance</span></div>
  <div class="row">
    <button class="btn primary" id="btn-dark" data-tip="Switch to dark theme">dark</button>
    <button class="btn" id="btn-light" data-tip="Switch to light theme" data-tip-align="right">light</button>
  </div>
</div>

<!-- Footer -->
<div class="pfooter">
  <span class="pm idle" id="footer-pm" data-tip="Overlay connection — live when capturing">
    <span class="d"></span>
    <span id="footer-status">idle</span>
  </span>
  <span class="spacer"></span>
</div>

<script src="dist/popup.js"></script>
</body>
</html>
